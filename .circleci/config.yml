version: 2.1
orbs:
    node: circleci/node@4.9.0
    qlty-orb: qltysh/qlty-orb@0.1.1
    samvera: samvera/circleci-orb@1.0.0
jobs:
    build:
        parameters:
            ruby_version:
                type: string
                default: 3.2.9
            bundler_version:
                type: string
                default: 2.4.19
        executor:
            name: samvera/ruby_fcrepo_solr_redis
            ruby_version: << parameters.ruby_version >>
            solr_version: 8.11.1
        docker:
            - image: cimg/mariadb:10.11.4
        working_directory: ~/project
        parallelism: 4
        steps:
            - checkout

            - node/install:
                install-yarn: true
                install-npm: false
                node-version: "v20.20.0"

            # - run:
            #     name: Install dockerize
            #     command: |
            #         # Install dockerize to wait for the database
            #         curl -L https://github.com | tar xz
            #         sudo mv dockerize-linux-amd64-v0.6.1/dockerize /usr/local/bin/dockerize

            # - run:
            #     name: Wait for MariaDB to be ready
            #     command: dockerize -wait tcp://localhost:3306 -timeout 60s

            - samvera/bundle:
                ruby_version: << parameters.ruby_version >>
                bundler_version: << parameters.bundler_version >>

            - samvera/rubocop

            - run:
                name: Get yarn version
                command: echo $(yarn --version) >> "YARN_VERSION"

            - restore_cache:
                keys:
                    - v1-yarn-{{ checksum "yarn.lock" }}-{{ checksum "YARN_VERSION" }}

            - run: yarn

            - save_cache:
                key: v1-yarn-{{ checksum "yarn.lock" }}-{{ checksum "YARN_VERSION" }}
                paths:
                    - ~/project/node_modules

            - samvera/install_solr_core

            - samvera/parallel_rspec

            - qlty-orb/coverage_publish:
                files: coverage/.resultset.json
                incomplete: true
                total_parts_count: 4

            - store_artifacts:
                path: tmp/screenshots

    coverage:
        docker:
            - image: cimg/ruby:3.2.9
        working_directory: ~/project
        parallelism: 1
        steps:
            - qlty-orb/coverage_complete

workflows:
    version: 2
    ci:
        jobs:
            - build:
                name: rspec
            - coverage:
                name: qlty
                requires:
                    - rspec
