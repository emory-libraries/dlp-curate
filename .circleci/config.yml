version: 2.1
orbs:
    node: circleci/node@4.9.0
    qlty-orb: qltysh/qlty-orb@0.1.1
    samvera: samvera/circleci-orb@1.0.1
jobs:
    build:
        parameters:
            bundler_version:
                type: string
                default: 2.4.19
            redis_version:
                type: string
                default: 7.4.2
            ruby_version:
                type: string
                default: 3.2.9
            solr_version:
                type: string
                default: 8.11.1
        executor:
            name: samvera/ruby_fcrepo_solr_redis
            ruby_version: << parameters.ruby_version >>
            solr_version: << parameters.solr_version >>
            redis_version: << parameters.redis_version >>
        working_directory: ~/project
        docker:
            - image: cimg/<< parameters.ruby_type >>:<< parameters.ruby_version >>-browsers
            - image: samvera/fcrepo4:<< parameters.fcrepo_version >>
                environment:
                    CATALINA_OPTS: "-Djava.awt.headless=true -Dfile.encoding=UTF-8 -server -Xms512m -Xmx1024m -XX:NewSize=256m -XX:MaxNewSize=256m -XX:PermSize=256m -XX:MaxPermSize=256m -XX:+DisableExplicitGC"
            - image: solr:<< parameters.solr_version >>
                command: bin/solr -cloud -noprompt -f -p << parameters.solr_port >>
            - image: redis:<< parameters.redis_version >>
            - image: cimg/mariadb:10.11.4
        parallelism: 4
        steps:
            - checkout

            - node/install:
                install-yarn: true
                install-npm: false
                node-version: "v20.20.0"

            - run:
                name: check ruby version and working directory contents
                command: ruby -v && ls -al

            - samvera/bundle:
                ruby_version: << parameters.ruby_version >>
                bundler_version: << parameters.bundler_version >>

            - samvera/rubocop

            - run:
                name: Get yarn version
                command: echo $(yarn --version) >> "YARN_VERSION"

            - restore_cache:
                keys:
                    - v1-yarn-{{ checksum "yarn.lock" }}-{{ checksum "YARN_VERSION" }}

            - run: yarn

            - save_cache:
                key: v1-yarn-{{ checksum "yarn.lock" }}-{{ checksum "YARN_VERSION" }}
                paths:
                    - ~/project/node_modules

            - samvera/install_solr_core

            - samvera/parallel_rspec

            - qlty-orb/coverage_publish:
                files: coverage/.resultset.json
                incomplete: true
                total_parts_count: 4

            - store_artifacts:
                path: tmp/screenshots

    coverage:
        docker:
            - image: cimg/ruby:3.2.9
        working_directory: ~/project
        parallelism: 1
        steps:
            - qlty-orb/coverage_complete

workflows:
    version: 2
    ci:
        jobs:
            - build:
                name: rspec
            - coverage:
                name: qlty
                requires:
                    - rspec
