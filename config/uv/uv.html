<!--
    This is what the embed iframe src links to. It doesn't need to communicate with the parent page, only fill the available space and look for #? parameters
-->

<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta charset="UTF-8" />
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" type="text/css" href="uv.css" />
    <script type="text/javascript" src="umd/UV.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="uv" class="uv"></div>

    <script>
      var urlAdaptor = new UV.IIIFURLAdaptor(true);

      const data = urlAdaptor.getInitialData({
        embedded: true
      });
      const manifestPath = new URL(data.iiifManifestId);
      const configOrigin = manifestPath.origin;
      const configId = manifestPath.pathname.split('/').at(-2);
      var configUrl = `${configOrigin}/uv/config/${configId}`;

      uv = UV.init("uv", data);

      uv.on("configure", function ({ config, cb }) {
        cb(
          new Promise(function (resolve) {
            fetch(configUrl).then(function (response) {
              resolve(response.json());
            });
          })
        );
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var $UV = document.getElementById("uv");

        function resize() {
          $UV.setAttribute("style", "width:" + window.innerWidth + "px");
          $UV.setAttribute("style", "height:" + window.innerHeight + "px");
        }

        document.addEventListener("resize", function () {
          resize();
        });

        resize();
      });
    </script>
  </body>
</html>
