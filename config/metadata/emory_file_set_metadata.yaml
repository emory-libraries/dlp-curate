# Custom metadata properties for the Valkyrie FileSet model.
# These attributes match the ActiveFedora FileSet model's custom properties.
#
# The complex nested `preservation_event` from the AF model is replaced
# with `preservation_event_ids` (string references), following the
# SelfDeposit pattern.

attributes:
  pcdm_use:
    type: string
    multiple: false
    form:
      primary: true
      multiple: false
    predicate: http://pcdm.org/use
    index_keys:
      - "pcdm_use_sim"
      - "pcdm_use_tesi"
  file_type:
    type: string
    multiple: false
    form:
      primary: false
      multiple: false
    predicate: http://purl.org/dc/elements/1.1/format
    index_keys:
      - "file_type_sim"
      - "file_type_tesi"
  deduplication_key:
    type: string
    multiple: false
    form:
      primary: false
      multiple: false
    predicate: http://metadata.emory.edu/vocab/predicates#deduplicationKey
    index_keys:
      - "deduplication_key_tesi"
