services:
  fcrepo:
    image: ghcr.io/samvera/fcrepo4:4.7.5
    volumes:
      - fcrepo:/data:cached
    ports:
      - 8984:8080
    networks:
      - curate

  fcrepo6:
    image: fcrepo/fcrepo:6.5.1-tomcat9
    environment:
      - >-
        CATALINA_OPTS=-Dfcrepo.home=/fcrepo-home -Djava.awt.headless=true -Dfile.encoding=UTF-8
        -server -Xms1G -Xmx2G -XX:NewSize=256m -XX:MaxNewSize=1G
        -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/data/mem
        -Dorg.apache.tomcat.util.buf.UDecoder.ALLOW_ENCODED_SLASH=true
        -Dfcrepo.jms.enabled=false -Dfcrepo.metrics.enable=true
      - JAVA_OPTS=-Dorg.apache.tomcat.util.buf.UDecoder.ALLOW_ENCODED_SLASH=true
    volumes:
      - fcrepo6:/fcrepo-home
    ports:
      - 8985:8080
    networks:
      - curate

  redis:
    image: redis:alpine
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - redis:/bitnamilegacy/redis/data
    ports:
      - 6379:6379
    networks:
      - curate

  solr:
    image: solr:8.11.1
    ports:
      - 8983:8983
    command:
      - sh
      - "-c"
      - "precreate-core hydra-development /opt/solr/server/configsets/hyraxconf; solr-precreate hydra-test /opt/solr/server/configsets/hyraxconf"
    volumes:
      - solr_home:/var/solr:cached
      - ./solr/config:/opt/solr/server/configsets/hyraxconf
    ulimits:
      nofile:
        soft: 65536
        hard: 524288
    networks:
      - curate

volumes:
  fcrepo:
  fcrepo6:
  redis:
  solr_home:

networks:
  curate:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-curate
